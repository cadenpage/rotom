[workspace]
authors = ["cadenpage <ckp634@my.utexas.edu>"]
channels = ["conda-forge"]
name = "rotom"
platforms = ["linux-aarch64"]
version = "0.1.0"

[tasks]
# Core robot utilities
calibration-gui = "bash -lc 'export PYTHONPATH=/home/caden/Documents/rotom/src:/home/caden/Documents/rotom/.pixi/envs/default/lib/python3.10/site-packages:$PYTHONPATH; python -m motors.calibration_gui'"
homing-offset = "bash -lc 'export PYTHONPATH=/home/caden/Documents/rotom/src:/home/caden/Documents/rotom/.pixi/envs/default/lib/python3.10/site-packages:$PYTHONPATH; python /home/caden/Documents/rotom/src/examples/homing_offset.py'"
home = "bash -lc 'export PYTHONPATH=/home/caden/Documents/rotom/src:/home/caden/Documents/rotom/.pixi/envs/default/lib/python3.10/site-packages:$PYTHONPATH; python /home/caden/Documents/rotom/src/examples/home.py'"
export-joint-limits = "bash -lc 'export PYTHONPATH=/home/caden/Documents/rotom/src:/home/caden/Documents/rotom/.pixi/envs/default/lib/python3.10/site-packages:$PYTHONPATH; python /home/caden/Documents/rotom/src/examples/export_joint_limits.py'"
ros2-motor-bridge = "bash -lc 'export PYTHONPATH=/home/caden/Documents/rotom/src:/home/caden/Documents/rotom/.pixi/envs/default/lib/python3.10/site-packages:$PYTHONPATH; source /opt/ros/humble/setup.bash; source /home/caden/Documents/rotom/src/ros2_ws/install/setup.bash; ros2 run rotom_control rotom_motor_bridge'"
ros2-build = "bash -lc 'source /opt/ros/humble/setup.bash; cd /home/caden/Documents/rotom/src/ros2_ws; colcon build --symlink-install'"
ros2-reset = "bash -lc '/home/caden/Documents/rotom/scripts/ros2_reset.sh'"
ros2-moveit-real = "bash -lc 'export PYTHONPATH=/home/caden/Documents/rotom/src:/home/caden/Documents/rotom/.pixi/envs/default/lib/python3.10/site-packages:$PYTHONPATH; source /opt/ros/humble/setup.bash; source /home/caden/Documents/rotom/src/ros2_ws/install/setup.bash; ros2 launch rotom_moveit_config real_hw.launch.py'"
ros2-servo-real = "bash -lc '/home/caden/Documents/rotom/scripts/ros2_clean_env.sh ros2 launch rotom_moveit_config servo_hw.launch.py'"
ros2-servo-real-headless = "bash -lc '/home/caden/Documents/rotom/scripts/ros2_clean_env.sh ros2 launch rotom_moveit_config servo_hw.launch.py use_rviz:=false'"
ros2-twist-relay = "bash -lc '/home/caden/Documents/rotom/scripts/ros2_clean_env.sh ros2 launch rotom_servo twist_relay.launch.py'"

# Canonical vision entry points
ros2-vision = "bash -lc '/home/caden/Documents/rotom/scripts/ros2_clean_env.sh ros2 launch rotom_vision vision_pipeline.launch.py'"
ros2-vision-debug = "bash -lc '/home/caden/Documents/rotom/scripts/ros2_clean_env.sh ros2 launch rotom_vision vision_pipeline.launch.py'"
ros2-vision-follow = "bash -lc '/home/caden/Documents/rotom/scripts/ros2_clean_env.sh ros2 launch rotom_vision vision_pipeline.launch.py enable_follower_output:=true'"
ros2-aruco-follow = "bash -lc '/home/caden/Documents/rotom/scripts/ros2_clean_env.sh ros2 launch rotom_moveit_config aruco_follow_hw.launch.py'"
ros2-view-camera = "bash -lc 'export DISPLAY=${DISPLAY:-:0}; export QT_QPA_PLATFORM=${QT_QPA_PLATFORM:-xcb}; /home/caden/Documents/rotom/scripts/ros2_clean_env.sh ros2 launch rotom_vision view_camera.launch.py'"

# Compatibility aliases
ros2-marker-follow = "bash -lc 'export PYTHONPATH=/home/caden/Documents/rotom/src:$PYTHONPATH; source /opt/ros/humble/setup.bash; source /home/caden/Documents/rotom/src/ros2_ws/install/setup.bash; ros2 launch rotom_vision marker_follow.launch.py'"
ros2-aruco-tracker = "bash -lc 'export PYTHONPATH=/home/caden/Documents/rotom/src:$PYTHONPATH; source /opt/ros/humble/setup.bash; source /home/caden/Documents/rotom/src/ros2_ws/install/setup.bash; ros2 launch rotom_vision aruco_tracker.launch.py'"
ros2-vision-pipeline = "bash -lc 'export PYTHONPATH=/home/caden/Documents/rotom/src:$PYTHONPATH; source /opt/ros/humble/setup.bash; source /home/caden/Documents/rotom/src/ros2_ws/install/setup.bash; ros2 launch rotom_vision vision_pipeline.launch.py'"
ros2-view-selected = "bash -lc 'export DISPLAY=${DISPLAY:-:0}; export QT_QPA_PLATFORM=${QT_QPA_PLATFORM:-xcb}; /home/caden/Documents/rotom/scripts/ros2_clean_env.sh ros2 launch rotom_vision view_camera.launch.py'"
ros2-view-aruco = "bash -lc 'export DISPLAY=${DISPLAY:-:0}; export QT_QPA_PLATFORM=${QT_QPA_PLATFORM:-xcb}; /home/caden/Documents/rotom/scripts/ros2_clean_env.sh ros2 launch rotom_vision view_aruco.launch.py'"
ros2-rqt-images = "bash -lc 'export ROS_LOG_DIR=/tmp/roslogs; export DISPLAY=${DISPLAY:-:0}; export QT_QPA_PLATFORM=${QT_QPA_PLATFORM:-xcb}; source /opt/ros/humble/setup.bash; rqt_image_view'"
ros2-moveit-rviz = "bash -lc 'export PYTHONPATH=/home/caden/Documents/rotom/src:/home/caden/Documents/rotom/.pixi/envs/default/lib/python3.10/site-packages:$PYTHONPATH; source /opt/ros/humble/setup.bash; source /home/caden/Documents/rotom/src/ros2_ws/install/setup.bash; ros2 launch rotom_moveit_config moveit_rviz.launch.py'"
ros2-view-robot = "bash -lc 'export PYTHONPATH=/home/caden/Documents/rotom/src:/home/caden/Documents/rotom/.pixi/envs/default/lib/python3.10/site-packages:$PYTHONPATH; source /opt/ros/humble/setup.bash; source /home/caden/Documents/rotom/src/ros2_ws/install/setup.bash; ros2 launch rotom_description view_robot.launch.py'"


[dependencies]
python = "3.10.*"
tqdm = ">=4.67.3,<5"
pygame = ">=2.6.1,<3"
pip = ">=26.0.1,<27"
py-opencv = ">=4.5,<5"
numpy = ">=1.24,<2"

[pypi-dependencies]
feetech-servo-sdk = ">=1.0.0, <2"
