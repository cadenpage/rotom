mediapipe_task_input:
  ros__parameters:
    bind_host: "0.0.0.0"
    bind_port: 8765
    delta_topic: "/rotom_task/delta_cmd"
    raw_pose_topic: "/rotom_task/raw_hand_pose"
    enabled_topic: "/rotom_task/teleop_enabled"
    frame_id: "teleop_hand"
    control_rate_hz: 60.0
    packet_timeout_s: 0.25
    min_confidence: 0.5
    require_clutch: true
    reset_origin_on_clutch_release: true
    deadband: 0.004
    smoothing_alpha: 0.45
    max_delta_speed: 0.20
    axis_map: [1, 0, 2]
    axis_signs: [-1.0, -1.0, 0.0]
    linear_scale_xyz: [0.16, 0.16, 0.0]
    publish_zero_when_stale: true
    warn_period_s: 2.0
