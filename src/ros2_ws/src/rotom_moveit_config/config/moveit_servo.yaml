/**:
  ros__parameters:
    moveit_servo:
      use_gazebo: false

      command_in_type: "speed_units"
      scale:
        linear: 1.0
        rotational: 1.0
        joint: 0.50

      publish_period: 0.02
      low_latency_mode: true

      command_out_type: trajectory_msgs/JointTrajectory
      publish_joint_positions: true
      publish_joint_velocities: true
      publish_joint_accelerations: false

      smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"
      is_primary_planning_scene_monitor: true

      move_group_name: army
      planning_frame: ground

      ee_frame_name: tool0
      robot_link_command_frame: tool0

      incoming_command_timeout: 0.15
      num_outgoing_halt_msgs_to_publish: 4

      lower_singularity_threshold: 100.0
      hard_stop_singularity_threshold: 200.0
      joint_limit_margin: 0.05
      leaving_singularity_threshold_multiplier: 1.0

      cartesian_command_in_topic: ~/delta_twist_cmds
      joint_command_in_topic: ~/delta_joint_cmds
      joint_topic: /joint_states
      status_topic: ~/status
      command_out_topic: /servo_node/joint_trajectory

      # Keep collision checks off for the first hardware bringup.
      check_collisions: false
      collision_check_rate: 10.0
      self_collision_proximity_threshold: 0.01
      scene_collision_proximity_threshold: 0.02
