mediapipe_teleop:
  ros__parameters:
    bind_host: "0.0.0.0"
    bind_port: 8765
    twist_topic: "/rotom_servo/cartesian_cmd"
    raw_pose_topic: "/rotom_teleop/raw_hand_pose"
    enabled_topic: "/rotom_teleop/enabled"
    raw_cmd_topic: "/rotom_teleop/cmd_raw"
    frame_id: "teleop_hand"
    control_rate_hz: 30.0
    packet_timeout_s: 0.25
    min_confidence: 0.5
    require_clutch: true
    reset_origin_on_clutch_release: true
    deadband: 0.015
    smoothing_alpha: 0.35
    max_linear_speed: 0.12
    max_angular_speed: 0.50
    linear_scale_xyz: [1.5, 0.45, 0.45]
    axis_map: [2, 0, 1]
    axis_signs: [-1.0, -1.0, -1.0]
    table_slide_mode: false
    table_slide_axis_map_xy: [1, 0]
    table_slide_axis_signs_xy: [-1.0, -1.0]
    table_slide_scale_xy: [0.30, 0.30]
    table_slide_world_frame: "ground"
    table_slide_frame: "tool0"
    table_slide_hold_orientation: false
    table_slide_tool_axis_local: [0.0, 1.0, 0.0]
    table_slide_target_axis_world: [0.0, 0.0, -1.0]
    table_slide_orientation_gain: 1.5
    publish_zero_when_stale: true
    warn_period_s: 2.0
